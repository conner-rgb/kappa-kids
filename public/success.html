<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>You're signed up!</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container narrow">
      <div class="card center">
        <div class="checkmark">✓</div>
        <h1>You're signed up!</h1>
        <p id="msg" class="muted">Confirming your payment…</p>
        <p><a href="/">Register another child</a></p>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const sid = params.get('sid');
      const cs = params.get('cs');

      async function confirm() {
        if (!sid) return;
        try {
          // Best effort — the webhook also confirms asynchronously.
          if (cs) {
            await fetch('/api/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sid, cs }),
            });
          }
          const res = await fetch('/api/signup/' + encodeURIComponent(sid));
          const data = await res.json();
          const msg = document.getElementById('msg');
          if (data.status === 'paid') {
            const amt = (data.amountPaid / 100).toLocaleString(undefined, {
              style: 'currency', currency: 'USD',
            });
            const extra = data.autoRenew
              ? '<br><br><span style="font-size:0.92rem;">Your membership will auto-renew at ' + amt +
                ' each year until you cancel. You can cancel or update your card any time via the link in your confirmation email.</span>'
              : '<br><br><span style="font-size:0.92rem;">This is a one-year membership \u2014 there\'s no auto-renewal, so you\'ll need to sign up again next year if you want to continue.</span>';
            msg.innerHTML =
              'Thanks, <strong>' + escapeHtml(data.parentName) + '</strong>! ' +
              'We\'ve registered ' + data.childCount + ' child' + (data.childCount > 1 ? 'ren' : '') +
              '. Your card was charged ' + amt + ' and a receipt is on its way.' + extra;
          } else {
            msg.textContent = 'Your signup is recorded. Payment is still processing — you\'ll get an email receipt shortly.';
          }
        } catch (e) {
          document.getElementById('msg').textContent = 'Your signup was received. Check your email for confirmation.';
        }
      }
      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      }
      confirm();
    </script>
  </body>
</html>
