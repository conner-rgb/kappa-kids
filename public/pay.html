<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Step 2 — Payment</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://js.stripe.com/v3/"></script>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <div class="steps">
          <span class="step done">1. Your info</span>
          <span class="step-sep">›</span>
          <span class="step current">2. Payment</span>
        </div>
        <h1>Review &amp; pay</h1>
        <p class="muted">Secure payment processing by Stripe.</p>
      </header>

      <!-- Stage 1: review + auto-renew choice -->
      <section id="review" class="card" hidden>
        <h2 style="margin-top:0;">Your membership</h2>
        <p id="summary" class="muted"></p>
        <label class="checkbox renew-box">
          <input type="checkbox" id="auto-renew" checked />
          <span>
            <strong>Auto-renew each year (recommended)</strong><br>
            <span class="muted small">
              We'll bill your card <span id="renew-amount"></span> every year on this date until you cancel.
              You can cancel any time from the link in your confirmation email. Uncheck this to make it a one-time
              <span id="one-time-amount"></span> payment with no renewal.
            </span>
          </span>
        </label>
        <div class="submit-row" style="margin-top:8px;">
          <div></div>
          <button id="proceed" class="primary">Continue to payment →</button>
        </div>
      </section>

      <!-- Stage 2: Stripe embedded checkout -->
      <div id="checkout" class="card" hidden>
        <p class="muted center" id="checkout-loading">Loading secure payment form…</p>
      </div>

      <!-- Dev mode preview (no Stripe keys) -->
      <div id="dev-banner" class="card center" hidden>
        <h2>Dev mode</h2>
        <p class="muted">
          No Stripe keys configured. Click below to simulate a successful payment so you can preview the flow.
        </p>
        <button id="dev-pay" class="primary">Simulate successful payment</button>
      </div>

      <p class="center">
        <a href="/" id="back-link" class="muted small">← Back to edit your info</a>
      </p>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const sid = params.get('sid');
      const dev = params.get('dev') === '1';

      function fmtMoney(cents, currency) {
        return new Intl.NumberFormat(undefined, {
          style: 'currency',
          currency: (currency || 'usd').toUpperCase(),
        }).format(cents / 100);
      }

      async function init() {
        if (!sid) {
          document.body.innerHTML =
            '<main class="container narrow"><div class="card"><p class="errors">' +
            'Missing signup reference. <a href="/">Start over</a>.</p></div></main>';
          return;
        }

        // Dev mode: skip everything, show simulate button.
        if (dev) {
          document.getElementById('dev-banner').hidden = false;
          document.getElementById('dev-pay').onclick = async () => {
            await fetch('/api/confirm-dev/' + encodeURIComponent(sid), { method: 'POST' }).catch(() => {});
            location.href = '/success.html?sid=' + encodeURIComponent(sid) + '&dev=1';
          };
          return;
        }

        // If the user refreshed after already creating a session, pick up where they left off.
        const [cfgRes, coRes, evRes] = await Promise.all([
          fetch('/api/stripe-config'),
          fetch('/api/checkout/' + encodeURIComponent(sid)),
          fetch('/api/event'),
        ]);
        const cfg = await cfgRes.json();
        const co = await coRes.json();
        const ev = await evRes.json();

        if (co.status === 'paid') {
          location.href = '/success.html?sid=' + encodeURIComponent(sid);
          return;
        }

        if (!cfg.configured) {
          document.getElementById('review').hidden = true;
          document.getElementById('checkout').hidden = false;
          document.getElementById('checkout').innerHTML =
            '<p class="errors">Stripe isn\'t fully configured. Contact the event organizer.</p>';
          return;
        }

        if (co.clientSecret) {
          // Session already exists (refresh case). Mount straight into Stripe.
          await mountCheckout(cfg.publishableKey, co.clientSecret);
          return;
        }

        // Fresh flow: show the review + auto-renew checkbox.
        const per = fmtMoney(ev.priceCents, ev.currency);
        document.getElementById('summary').innerHTML =
          'Today: <strong>' + per + ' per child</strong> · covers the full year.';
        document.getElementById('renew-amount').textContent = per + ' per child';
        document.getElementById('one-time-amount').textContent = per + ' per child';
        document.getElementById('review').hidden = false;
        document.getElementById('proceed').addEventListener('click', onProceed);
      }

      async function onProceed() {
        const btn = document.getElementById('proceed');
        btn.disabled = true;
        btn.textContent = 'Loading payment form…';

        const autoRenew = document.getElementById('auto-renew').checked;
        let data;
        try {
          const res = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sid, autoRenew }),
          });
          data = await res.json();
          if (!res.ok || !data.clientSecret) throw new Error(data.error || 'No session');
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Continue to payment →';
          alert('Could not start payment. Please try again.');
          return;
        }

        // Swap the review card for the embedded Stripe form.
        document.getElementById('review').hidden = true;
        document.getElementById('checkout').hidden = false;
        const cfgRes = await fetch('/api/stripe-config');
        const cfg = await cfgRes.json();
        await mountCheckout(cfg.publishableKey, data.clientSecret);
      }

      async function mountCheckout(publishableKey, clientSecret) {
        const stripe = Stripe(publishableKey);
        const checkout = await stripe.initEmbeddedCheckout({ clientSecret });
        const loading = document.getElementById('checkout-loading');
        if (loading) loading.remove();
        checkout.mount('#checkout');
      }

      init();
    </script>
  </body>
</html>
